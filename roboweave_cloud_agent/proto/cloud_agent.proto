syntax = "proto3";

package roboweave.cloud_agent;

service CloudAgentService {
  rpc SubmitTask (SubmitTaskRequest) returns (SubmitTaskResponse);
  rpc SubmitTaskStream (SubmitTaskRequest) returns (stream SubmitTaskStreamResponse);
  rpc AnalyzeFailure (AnalyzeFailureRequest) returns (AnalyzeFailureResponse);
  rpc UpdateWorldState (UpdateWorldStateRequest) returns (UpdateWorldStateResponse);
}

message SubmitTaskRequest {
  string task_id = 1;
  string user_id = 2;
  string instruction = 3;
  string input_type = 4;
  SceneContext scene_context = 5;
  repeated AttachmentRef attachments = 6;
  string priority = 7;
  bool require_confirmation = 8;
}

message SceneContext {
  string scene_id = 1;
  string robot_id = 2;
  map<string, string> additional = 3;
}

message AttachmentRef {
  string uri = 1;
  string media_type = 2;
}

enum ResponseType {
  PLAN = 0;
  REJECTION = 1;
  CLARIFICATION = 2;
  ERROR = 3;
}

message SubmitTaskResponse {
  ResponseType response_type = 1;
  PlanGraphProto plan = 2;
  string error_message = 3;
  ClarificationRequest clarification = 4;
}

message StreamEventType {
  enum Type {
    STATUS_UPDATE = 0;
    PLAN_COMPLETE = 1;
    ERROR_OCCURRED = 2;
    CLARIFICATION_NEEDED = 3;
  }
}

message SubmitTaskStreamResponse {
  StreamEventType.Type event_type = 1;
  string message = 2;
  PlanGraphProto plan = 3;
  ClarificationRequest clarification = 4;
  bool is_final = 5;
}

message ClarificationRequest {
  string question = 1;
  repeated string options = 2;
}

message AnalyzeFailureRequest {
  ExecutionEventProto event = 1;
}

message AnalyzeFailureResponse {
  string analysis = 1;
  repeated string recovery_actions = 2;
  string rationale_summary = 3;
}

message UpdateWorldStateRequest {
  string robot_id = 1;
  string ref_uri = 2;
  double timestamp = 3;
}

message UpdateWorldStateResponse {
  bool accepted = 1;
  string message = 2;
}

message PlanGraphProto {
  string schema_version = 1;
  string plan_id = 2;
  string task_id = 3;
  repeated PlanNodeProto nodes = 4;
  SuccessCondition success_condition = 5;
  FailurePolicy failure_policy = 6;
}

message PlanNodeProto {
  string schema_version = 1;
  string node_id = 2;
  string node_type = 3;
  string skill_name = 4;
  string inputs_envelope_json = 5;
  string constraints_envelope_json = 6;
  repeated string depends_on = 7;
  repeated string preconditions = 8;
  repeated string postconditions = 9;
  RetryPolicyProto retry_policy = 10;
  int32 timeout_ms = 11;
  repeated string on_success = 12;
  repeated string on_failure = 13;
  string rollback_action = 14;
  string recovery_policy_id = 15;
  repeated string required_resources = 16;
  bool interruptible = 17;
  string safety_level = 18;
}

message RetryPolicyProto {
  int32 max_retries = 1;
  int32 backoff_ms = 2;
  string backoff_strategy = 3;
}

message SuccessCondition {
  map<string, string> conditions = 1;
}

message FailurePolicy {
  int32 max_retry = 1;
  string fallback = 2;
}

message ExecutionEventProto {
  string schema_version = 1;
  string event_id = 2;
  string task_id = 3;
  string node_id = 4;
  string event_type = 5;
  string failure_code = 6;
  string severity = 7;
  string message = 8;
  repeated string recovery_candidates = 9;
  double timestamp = 10;
}
